# ============================================================
# Konfigurasi Netplan - Kelompok 7 UMRAH
# Implementasi High Availability Server dengan Load Balancing
# ============================================================

# ------------------------------------------------------------
# HAProxy Load Balancer (192.168.56.10)
# File: /etc/netplan/00-installer-config.yaml
# ------------------------------------------------------------
network:
  version: 2
  ethernets:
    enp0s3:
      dhcp4: no
      addresses:
        - 192.168.56.10/24
      gateway4: 192.168.56.1
      nameservers:
        addresses:
          - 8.8.8.8

